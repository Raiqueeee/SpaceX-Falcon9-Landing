env:
  name: rocket_lander
  library: custom
  # Optimal landing from 15 m takes only ~77 steps (50 above gate + 27 braking).
  # 250 gives 3x safety margin and forces faster episode resets when hovering.
  max_episode_steps: 250
  seed: 42
  num_envs: 16
  # Start at 15 m instead of 50 m. Physics analysis shows that from 50 m the
  # rocket free-falls to 29.7 m/s at the 5-m gate — physically impossible to
  # brake in 5 m. From 15 m it arrives at ~7 m/s (well within braking range).
  # Also: discount factor 0.99^400 ≈ 0.007 makes the landing bonus invisible
  # from 50 m; from 15 m it lands at step ~130, discount = 0.27 (clearly visible).
  starting_height: 15.0
  rocket:
    design: demo
  reward_weights:
    # Below-gate approach rewards (only active when altitude < 5 m)
    distance: 0.40   # altitude-to-target + horizontal alignment
    velocity: 0.30   # slow speed required near ground
    upright: 0.20    # stay vertical during final approach
    angular: 0.10    # no spin
    # Terminal
    success: 10000.0 # massive landing bonus
    crash: -100.0    # hard crash penalty
    tipover: -50.0   # tip-over penalty
    # time_penalty doubles as forced-descent rate above 5 m (no positive reward up there)
    time_penalty: 0.50
  velocity_penalty:
    gate_scale: 15.0
    coeff: 3.0
  termination:
    max_distance: 20.0
    max_angle: 70.0
    crash_velocity: 5.0
  reset_noise:
    pos: 3.0
    vel: 3.0
    ang: 0.15
    angvel: 0.3
collector:
  # 1M frames achieves ~30% success rate (descends but unreliable landing).
  # 3M frames achieves ~80% success rate (reliable smooth landing ~67 min wall time).
  total_frames: 3_000_000
  # 1024 frames/batch = 16 envs × 64 steps each.
  # Doubled from 512: more diverse rollout data per update, better gradient estimates.
  frames_per_batch: 1024
  device: cpu
loss:
  clip_epsilon: 0.2
  entropy_coeff: 0.02
  critic_coeff: 0.5
  loss_critic_type: l2
  ppo_epochs: 3
  mini_batch_size: 128
  gamma: 0.99
  gae_lambda: 0.97
  max_grad_norm: 0.5
  anneal_lr: true
  anneal_clip_epsilon: true
optim:
  lr: 3.0e-4
  device: cpu
network:
  # 128x128 is ~4x fewer FLOPs than 256x256 on CPU, with minimal quality loss
  # for this task. Main speedup lever on CPU training.
  hidden_sizes: [128, 128]
  activation: tanh
  device: cpu
logger:
  backend: wandb
  project_name: SpaceX-Landing
  group_name: null
  exp_name: rocket_lander_PPO_CPU_v3
  mode: offline
  eval_iter: 100_000
  video: false
  log_crash_breakdown: true
